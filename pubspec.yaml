name: gentleman_os
description: Personal offline-first decision-support app for the modern gentleman.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # State management & DI
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Local database
  drift: ^2.18.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.20

  # Code generation: models
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Charts
  fl_chart: ^0.68.0

  # Image
  image_picker: ^1.1.2

  # File system & paths
  path_provider: ^2.1.3
  path: ^1.9.0

  # Markdown rendering
  flutter_markdown: ^0.7.3

  # UUID generation
  uuid: ^4.4.0

  # Secure storage
  flutter_secure_storage: ^9.0.0

  # Share / export
  share_plus: ^9.0.0

  # Permissions
  permission_handler: ^11.3.1

  # Intl
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

  # Code generation
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  drift_dev: ^2.18.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  go_router_builder: ^2.7.1
  custom_lint: ^0.6.7
  riverpod_lint: ^2.3.13

flutter:
  uses-material-design: true

  assets:
    - assets/knowledge/
    - assets/seed/
    - assets/images/
