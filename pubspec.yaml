name: gentleman_os
description: Personal offline-first decision-support app for the modern gentleman.

publish_to: 'none'

version: 1.0.0+1

# Версии актуализированы на июнь 2026 (Flutter 3.44 / Dart 3.9+).
# Спецификация пакетов и ссылки на документацию: docs/13-packages-spec.md
environment:
  sdk: '>=3.9.0 <4.0.0'
  flutter: '>=3.44.0'

dependencies:
  flutter:
    sdk: flutter

  # State management & DI (Riverpod 3.x)
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3

  # Navigation
  go_router: ^17.3.0

  # Local database
  drift: ^2.34.0
  drift_flutter: ^0.3.0
  sqlite3_flutter_libs: ^0.6.0

  # Code generation: models (Freezed 3.x)
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0

  # Charts
  fl_chart: ^1.2.0

  # Image
  image_picker: ^1.2.2

  # File system & paths
  path_provider: ^2.1.6
  path: ^1.9.0

  # Markdown rendering (flutter_markdown discontinued → flutter_markdown_plus)
  flutter_markdown_plus: ^1.0.7

  # UUID generation
  uuid: ^4.5.3

  # Secure storage (для ключа RouterAI)
  flutter_secure_storage: ^10.3.1

  # Share / export
  share_plus: ^13.1.0

  # Permissions
  permission_handler: ^12.0.3

  # Intl
  intl: ^0.20.2

  # HTTP-клиент для RouterAI (OpenAI-совместимый API)
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.15.0
  riverpod_generator: ^4.0.4
  drift_dev: ^2.34.0
  freezed: ^3.2.5
  json_serializable: ^6.14.0
  go_router_builder: ^4.3.0
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.4

flutter:
  uses-material-design: true

  assets:
    - assets/knowledge/
    - assets/seed/
    - assets/images/
