org.gradle.jvmargs=-Xmx4G -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
# AGP 9 по умолчанию читает только новый DSL, из-за чего падает применение
# Flutter Gradle plugin (legacy DSL в app/build.gradle). Явно остаёмся на
# старом DSL — совместимо с текущей конфигурацией Flutter 3.44.
android.newDsl=false
